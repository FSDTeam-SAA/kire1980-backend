<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Booking Received</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f6f7fb;
      font-family: Arial, sans-serif;
      color: #1f2937;
    "
  >
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      style="padding: 24px 12px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="100%"
            style="
              max-width: 600px;
              background: #ffffff;
              border-radius: 12px;
              padding: 24px;
            "
          >
            <tr>
              <td>
                <h2 style="margin: 0 0 12px">New Booking Received</h2>
                <p style="margin: 0 0 12px">Hello {{businessName}},</p>
                <p style="margin: 0 0 12px">
                  A new booking has been made by
                  <strong>{{customerName}}</strong>.
                </p>
                <p style="margin: 0 0 8px">
                  Booking ID: <strong>{{bookingId}}</strong>
                </p>
                <p style="margin: 0 0 8px">
                  First service time: <strong>{{firstServiceDateTime}}</strong>
                </p>
                <p style="margin: 0 0 16px">
                  Number of services: <strong>{{totalServices}}</strong>
                </p>
                <p style="margin: 0">Please review and prepare accordingly.</p>
              </td>
            </tr>
            <tr>
              <td style="padding-top: 20px; font-size: 12px; color: #6b7280">
                &copy; {{year}} Kire1980. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
